services:
  postgres:
    image: postgres:15.14-trixie
    container_name: postgres_workbench
    environment:
      TZ: Asia/Seoul
      POSTGRES_DB: workbench
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - $HOME/docker_volumes/postgres_workbench:/var/lib/postgresql/data
